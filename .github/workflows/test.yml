name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # golang.design/x/clipboard cgo-compiles clipboard_linux.c which
      # #includes <X11/Xlib.h>. The Linux stub at runtime is fine when
      # CGO_ENABLED=0, but `go vet` and `go test -race` both compile cgo
      # files, so we need the headers present in CI.
      - name: install libx11-dev
        run: sudo apt-get update && sudo apt-get install -y libx11-dev

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -count=1
